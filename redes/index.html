<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suzu Kurai | Redes</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="/rsc/favicon.png">
</head>

<body class="linktree-mode">

<header>
    <div id="header-particles"></div>
    <div class="header-content">
        <img src="../rsc/Suzu Kurai Logo.png" alt="Suzu Kurai Logo" class="header-logo">
    </div>
</header>

<nav class="topnav">
        <a href="/" class="topnav-link">Inicio</a>
        <a href="/lore" class="topnav-link">Lore</a>
        <a href="/comandos" class="topnav-link">Comandos</a>
        <a href="/redes" class="topnav-link active">Redes</a>
        <a href="/vip" class="topnav-link">VIP</a>
    </nav>

    <div class="linktree-container">
        <div class="hero-content">
            <h2>CONECTEMOS</h2>
            <p style="color: var(--text-muted); margin-top: 10px;">¡Sígueme en mis rincones digitales!</p>
        </div>

        <div class="link-list">
            <a href="/redes/twitch" target="_blank" class="link-item">
                <img src="../rsc/twitch-icon.png" alt="" class="link-icon">
                <span>TWITCH</span>
            </a>

            <a href="/redes/discord" target="_blank" class="link-item">
                <img src="../rsc/discord-icon.png" alt="" class="link-icon">
                <span>DISCORD</span>
            </a>

            <a href="/redes/youtube" target="_blank" class="link-item">
                <img src="../rsc/youtube-icon.png" alt="" class="link-icon">
                <span>YOUTUBE</span>
            </a>

            <a href="/redes/tiktok" target="_blank" class="link-item">
                <img src="../rsc/tiktok-icon.png" alt="" class="link-icon">
                <span>TIKTOK</span>
            </a>

            <a href="/redes/twitter" target="_blank" class="link-item">
                <img src="../rsc/twitter-icon.png" alt="" class="link-icon">
                <span>TWITTER / X</span>
            </a>

            <a href="/redes/kofi" target="_blank" class="link-item">
                <img src="../rsc/kofi-icon.png" alt="" class="link-icon">
                <span>KOFI</span>
            </a>

            <a href="../" target="_blank" class="link-item">
                <img src="../rsc/Suzu Kurai Logo.png" alt="" class="link-icon">
                <span>PÁGINA WEB</span>
            </a>
        </div>

    </div>
    
    <script>
        function createParticles() {
            const container = document.getElementById("header-particles");
            for (let i = 0; i < 40; i++) {
                const p = document.createElement("div");
                p.classList.add("particle");
                p.style.left = Math.random() * 100 + "%";
                p.style.top = Math.random() * 100 + "%";
                const size = Math.random() * 3 + 1 + "px";
                p.style.width = size; p.style.height = size;
                p.style.animationDuration = Math.random() * 10 + 5 + "s";
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
