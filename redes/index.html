<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suzu Kurai | Redes</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/png" href="/rsc/favicon.png">
</head>
<body class="linktree-mode">

    <div id="header-particles" style="position: fixed; height: 100vh;"></div>

    <div class="linktree-container">
        <header class="linktree-header">
            <img src="../rsc/Suzu Kurai Logo.png" alt="Suzu Logo" class="linktree-avatar">
            <h1>SUZU KURAI</h1>
            <p class="glitch-text" style="font-size: 0.9rem; color: var(--accent-purple);">MURCIÉLAGO CREPUSCULAR</p>
        </header>

        <div class="link-list">
            <a href="https://twitch.tv/SuzuKurai" target="_blank" class="link-item">
                <img src="../rsc/twitch-icon.png" alt="" class="link-icon">
                <span>TWITCH</span>
            </a>

            <a href="https://twitter.com/tu_usuario" target="_blank" class="link-item">
                <img src="../rsc/x-icon.png" alt="" class="link-icon">
                <span>TWITTER / X</span>
            </a>

            <a href="https://tiktok.com/@tu_usuario" target="_blank" class="link-item">
                <img src="../rsc/tiktok-icon.png" alt="" class="link-icon">
                <span>TIKTOK</span>
            </a>

            <a href="https://discord.gg/tu_invitacion" target="_blank" class="link-item">
                <img src="../rsc/discord-icon.png" alt="" class="link-icon">
                <span>DISCORD</span>
            </a>

            <a href="../" class="link-item highlight">
                <span>🌐 VISITAR WEB OFICIAL</span>
            </a>
        </div>

        <footer>
            <p>© 2026 Suzu_VT</p>
        </footer>
    </div>

    <script>
        // Reutilizamos tu función de partículas para el fondo
        function createParticles() {
            const container = document.getElementById('header-particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                const size = Math.random() * 3 + 1 + 'px';
                p.style.width = size; p.style.height = size;
                p.style.animationDuration = Math.random() * 10 + 5 + 's';
                container.appendChild(p);
            }
        }
        createParticles();
    </script>
</body>
</html>
